<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title"></title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="white-flash" id="white-flash"></div>
    <!-- HERO -->
    <section class="hero">
      <h1 id="girl-name"></h1>
      <p>Scroll slowly 👇</p>
    </section>

    <!-- STICKY STACK -->
    <div class="stack" id="stack"></div>
    <!-- FINAL CARD -->
    <section class="final-card">
      <div class="breakable" id="breakable">
        <!-- CRACK OVERLAY -->
        <svg
          class="crack-layer"
          viewBox="0 0 80 80"
          preserveAspectRatio="none"
          id="crack-svg"
        ></svg>
        <span class="hint" id="break-hint"></span>

        <div class="message">
          <h2 id="final-title"></h2>
          <p id="final-message"></p>
        </div>
      </div>
    </section>
    <script src="./script.js"></script>
    <!--script src="../shared/scroll-footage.js"></script-->
    <script src="../effects/cracks.js"></script>
    <script src="../effects/vector.js"></script>
  </body>
</html>
